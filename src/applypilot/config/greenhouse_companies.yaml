# Greenhouse company registry for ApplyPilot
# Each entry maps an internal key to a public Greenhouse "board_token".
# The board_token is the slug used at https://boards.greenhouse.io/{board_token}
# and the corresponding API endpoint:
#   https://boards-api.greenhouse.io/v1/boards/{board_token}/jobs?content=true
#
# Add your own employer by visiting boards.greenhouse.io/<token> in a browser
# (the token is the path segment) and dropping it in below.

companies:

  # -- SaaS / Developer Tools ----------------------------------------------
  hubspot:    { name: "HubSpot",    board_token: "hubspot" }
  cloudflare: { name: "Cloudflare", board_token: "cloudflare" }
  stripe:     { name: "Stripe",     board_token: "stripe" }
  asana:      { name: "Asana",      board_token: "asana" }
  notion:     { name: "Notion",     board_token: "notion" }
  figma:      { name: "Figma",      board_token: "figma" }
  databricks: { name: "Databricks", board_token: "databricks" }
  rippling:   { name: "Rippling",   board_token: "rippling" }
  benchling:  { name: "Benchling",  board_token: "benchling" }
  plaid:      { name: "Plaid",      board_token: "plaid" }

  # -- Consumer / Marketplace ----------------------------------------------
